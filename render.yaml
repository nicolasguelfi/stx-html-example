services:
  - type: web
    name: html-example-streamtex
    runtime: docker
    repo: https://github.com/nicolasguelfi/html-example-streamtex
    branch: main
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: STX_PASSWORD
        value: changeme
    healthCheckPath: /_stcore/health
